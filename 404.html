    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // GitHub Pages SPA redirect helper
      // When the user requests a route (e.g. /dashboard), GitHub Pages serves 404.html.
      // This script redirects back to the app root while encoding the original route
      // in the query string, so the app can restore it on load.
      (function() {
        var baseEl = document.querySelector('base');
        var baseHref = baseEl ? baseEl.getAttribute('href') : '/';
        if (!baseHref.endsWith('/')) baseHref += '/';

        // Avoid redirect loops if already in the encoded query format
        if (window.location.search && window.location.search[1] === '/') {
          return;
        }

        // Strip the base from the current path so the app can route correctly.
        var route = window.location.pathname;
        if (route.indexOf(baseHref) === 0) {
          route = '/' + route.slice(baseHref.length);
        }

        var search = window.location.search.replace(/^\?/, '');
        if (search) search = '&' + search;

        var hash = window.location.hash || '';

        var redirectUrl = baseHref + '?' + route + search + hash;
        window.location.replace(redirectUrl);
      })();
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
  <body>
    <div id="root"></div>
  </body>
